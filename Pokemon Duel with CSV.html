<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Duel - English Action Quiz</title>
    <style>
        :root {
            --pikachu-yellow: #ffcb05;
            --bulbasaur-green: #4db3a2;
            --pokemon-blue: #2a75bb;
            --hp-green: #2ed573;
            --hp-red: #ff4757;
            --text-shadow: 2px 2px 0px #000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            overflow: hidden;
            background-color: #1a1a1a;
            user-select: none;
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            background-size: cover;
            background-position: center;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .screen.active { display: flex; }

        #start-screen { 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('bg.png'); 
            background-size: cover;
            background-position: center;
        }
        
        #game-screen { 
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('gamebg.png'); 
            background-size: cover;
            background-position: center;
        }

        .btn {
            padding: 15px 40px;
            font-size: 22px;
            margin: 10px;
            cursor: pointer;
            border-radius: 50px;
            border: 4px solid #fff;
            background: var(--pikachu-yellow);
            color: var(--pokemon-blue);
            font-weight: bold;
            box-shadow: 0 4px 0px rgba(0,0,0,0.2);
            transition: all 0.1s;
        }

        .btn:active { transform: translateY(2px); box-shadow: none; }
        .btn-secondary { background: #eee; font-size: 18px; color: #333; }
        .btn-ai { background: #a55eea; color: white; border-color: #fff; }

        .setup-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 30px;
            border: 5px solid var(--pokemon-blue);
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .hud-container {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }

        .player-hud {
            width: 280px;
            background: rgba(0,0,0,0.8);
            padding: 12px;
            border-radius: 15px;
            border: 2px solid #fff;
            color: white;
        }

        .hp-bar-outer {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .hp-bar-inner {
            height: 100%;
            width: 100%;
            background: var(--hp-green);
            transition: width 0.3s ease;
        }

        .battlefield {
            position: absolute;
            top: 42%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .sprite {
            width: 280px;
            height: 280px;
            object-fit: contain;
            transition: transform 0.2s;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .hit-spark {
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #fff 0%, #f1c40f 60%, transparent 100%);
            opacity: 0;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 10;
        }

        .quiz-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 38%;
            display: flex;
            background: rgba(0,0,0,0.85);
            border-top: 4px solid var(--pokemon-blue);
        }

        .quiz-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border-right: 2px solid rgba(255,255,255,0.2);
            position: relative;
        }

        .quiz-panel.frozen {
            pointer-events: none;
        }

        .frozen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 191, 255, 0.6);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 42px;
            font-weight: bold;
            text-shadow: 0 0 10px #00f, 2px 2px 4px #000;
            z-index: 200;
        }
        .quiz-panel.frozen .frozen-overlay { display: flex; }

        .question-box {
            background: white;
            border-radius: 20px;
            padding: 12px;
            width: 90%;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .prompt-img {
            width: 110px;
            height: 110px;
            border-radius: 15px;
            object-fit: cover;
            background: #eee;
            border: 3px solid var(--pokemon-blue);
        }

        .choices-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 90%;
        }

        .choice-item {
            background: #fff;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border: 3px solid #ccc;
            text-align: center;
            transition: transform 0.1s, background 0.2s;
        }

        .choice-item:hover { background: #f0f0f0; }
        .choice-item:active { transform: scale(0.95); }

        .loading-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Audio assets -->
    <audio id="m-start" src="bg.mp3" loop></audio>
    <audio id="m-battle" src="gamebattle.mp3" loop></audio>
    <audio id="s-attack" src="attack.mp3"></audio>
    <audio id="s-powerup" src="powerup.mp3"></audio>

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <h1 style="font-size: 80px; color: var(--pikachu-yellow); text-shadow: 5px 5px 0px var(--pokemon-blue); margin-bottom: 10px;">POKEMON DUEL</h1>
        
        <div id="setup-menu" class="setup-container">
            <h2 style="color: var(--pokemon-blue); margin-top:0;">Battle Quiz</h2>
            <p>Upload your own CSV or use AI to generate questions!</p>
            
            <button class="btn btn-ai" onclick="useAIQuestions()">✨ Generate AI Pictures</button>
            
            <div style="margin: 15px 0;">
                <label for="csv-upload" class="btn btn-secondary" style="display:inline-block;">
                    📂 Upload CSV (5 Columns)
                </label>
                <input type="file" id="csv-upload" accept=".csv" class="hidden" onchange="handleFileUpload(event)">
            </div>

            <div id="status-msg" style="font-size: 14px; color: #444; font-weight: bold; margin-top: 10px;">
                Ready with default action questions
            </div>
            
            <button id="start-btn" class="btn" onclick="startGame()" style="margin-top:20px; width: 100%;">BATTLE!</button>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading-overlay">
        <div style="font-size: 60px; margin-bottom: 20px;">⚡</div>
        <div id="loading-text" style="font-size: 24px;">Preparing AI Pictures...</div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="hud-container">
            <div class="player-hud">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size: 18px;">
                    <span>PIKACHU</span> <span id="hp-text-left">100</span>
                </div>
                <div class="hp-bar-outer"><div id="hp-bar-left" class="hp-bar-inner"></div></div>
            </div>
            <div class="player-hud">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size: 18px;">
                    <span>BULBASAUR</span> <span id="hp-text-right">100</span>
                </div>
                <div class="hp-bar-outer"><div id="hp-bar-right" class="hp-bar-inner"></div></div>
            </div>
        </div>

        <div class="battlefield">
            <div style="position:relative">
                <img id="p-left" class="sprite" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png">
                <div id="spark-left" class="hit-spark"></div>
            </div>
            <div style="font-size:70px; color:white; font-style:italic; font-weight:bold; text-shadow: 0 0 20px rgba(255,255,255,0.5);">VS</div>
            <div style="position:relative">
                <img id="p-right" class="sprite" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png">
                <div id="spark-right" class="hit-spark"></div>
            </div>
        </div>

        <div class="quiz-area">
            <div id="panel-left" class="quiz-panel">
                <div class="frozen-overlay">WRONG! ❄️</div>
                <div class="question-box">
                    <img id="img-left" class="prompt-img" src="">
                    <div style="text-align:left; flex: 1;">
                        <h4 id="q-header-left" style="margin:0; font-size:16px; color: #666;">QUESTION</h4>
                        <p id="q-text-left" style="margin:5px 0 0; font-size:22px; font-weight:bold; color: var(--pokemon-blue);">---</p>
                    </div>
                </div>
                <div class="choices-grid" id="choices-left"></div>
            </div>
            <div id="panel-right" class="quiz-panel">
                <div class="frozen-overlay">WRONG! ❄️</div>
                <div class="question-box">
                    <img id="img-right" class="prompt-img" src="">
                    <div style="text-align:left; flex: 1;">
                        <h4 id="q-header-right" style="margin:0; font-size:16px; color: #666;">QUESTION</h4>
                        <p id="q-text-right" style="margin:5px 0 0; font-size:22px; font-weight:bold; color: var(--pokemon-blue);">---</p>
                    </div>
                </div>
                <div class="choices-grid" id="choices-right"></div>
            </div>
        </div>
    </div>

    <!-- Win Screen -->
    <div id="win-screen" class="screen" style="background:rgba(0,0,0,0.95); color:white;">
        <h1 id="win-msg" style="font-size:70px; color: var(--pikachu-yellow);">BATTLE FINISHED!</h1>
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script>
        const apiKey = ""; 
        
        // Default questions if no CSV is uploaded
        let quizPool = [
            { q: "What is he doing?", img: 'https://loremflickr.com/400/400/eating,boy', ans: 'eating', wrongs: ['sleeping', 'running'] },
            { q: "What is she doing?", img: 'https://loremflickr.com/400/400/reading,girl', ans: 'reading', wrongs: ['dancing', 'cooking'] },
            { q: "What is she doing?", img: 'https://loremflickr.com/400/400/dancing', ans: 'dancing', wrongs: ['eating', 'jumping'] },
            { q: "What is he doing?", img: 'https://loremflickr.com/400/400/jumping,boy', ans: 'jumping', wrongs: ['writing', 'swimming'] },
            { q: "What is he doing?", img: 'https://loremflickr.com/400/400/running', ans: 'running', wrongs: ['reading', 'drinking'] },
            { q: "What is she doing?", img: 'https://loremflickr.com/400/400/swimming', ans: 'swimming', wrongs: ['jumping', 'cooking'] },
            { q: "What is she doing?", img: 'https://loremflickr.com/400/400/writing', ans: 'writing', wrongs: ['dancing', 'eating'] },
            { q: "What is he doing?", img: 'https://loremflickr.com/400/400/drinking,water', ans: 'drinking', wrongs: ['reading', 'running'] },
            { q: "What is she doing?", img: 'https://loremflickr.com/400/400/cooking', ans: 'cooking', wrongs: ['swimming', 'writing'] }
        ];

        let state = {
            left: { hp: 100, ans: '', frozen: false },
            right: { hp: 100, ans: '', frozen: false },
            active: false
        };

        const sounds = {
            start: document.getElementById('m-start'),
            battle: document.getElementById('m-battle'),
            attack: document.getElementById('s-attack'),
            powerup: document.getElementById('s-powerup')
        };

        function playSound(sound) {
            if (sound && sound.src) {
                sound.currentTime = 0;
                sound.play().catch(e => console.warn("Audio play blocked", e));
            }
        }

        function stopSound(sound) {
            if (sound) {
                sound.pause();
                sound.currentTime = 0;
            }
        }

        // --- CSV HANDLING ---

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const rows = text.split('\n').filter(row => row.trim() !== '');
                if (rows.length < 2) {
                    alert("The CSV seems empty or invalid.");
                    return;
                }

                // Assuming CSV structure: Question, Image, Correct, Wrong1, Wrong2
                const newPool = [];
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(',').map(c => c.trim());
                    if (cols.length < 3) continue; // Min: Question, Image (can be empty), Correct
                    
                    const questionText = cols[0];
                    const imageSource = cols[1] || `https://loremflickr.com/400/400/${cols[2].replace(/\s/g, '')}`;
                    const correctAnswer = cols[2];
                    const wrongAnswers = [];
                    if (cols[3]) wrongAnswers.push(cols[3]);
                    if (cols[4]) wrongAnswers.push(cols[4]);

                    newPool.push({
                        q: questionText,
                        img: imageSource,
                        ans: correctAnswer,
                        wrongs: wrongAnswers
                    });
                }

                if (newPool.length > 0) {
                    quizPool = newPool;
                    document.getElementById('status-msg').innerText = `✅ Loaded ${quizPool.length} Custom Questions`;
                }
            };
            reader.readAsText(file);
        }

        // --- AI GENERATION ---

        async function useAIQuestions() {
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';
            
            const prompt = "Generate a JSON array of 12 questions. Each object should have: 'q' (the question), 'img_keyword' (one word to search for an image), 'ans' (the correct answer), and 'wrongs' (an array of 2-3 incorrect options). Use simple English for kids.";

            try {
                const response = await callGemini(prompt);
                const aiData = JSON.parse(response);
                
                quizPool = aiData.map(item => ({
                    q: item.q,
                    img: `https://loremflickr.com/400/400/${item.img_keyword},clipart`,
                    ans: item.ans,
                    wrongs: item.wrongs
                }));

                document.getElementById('status-msg').innerText = `✅ AI Prepared ${quizPool.length} Questions!`;
            } catch (err) {
                console.error("AI Generation Error:", err);
                document.getElementById('status-msg').innerText = "❌ AI Error. Using current list.";
            } finally {
                loading.style.display = 'none';
            }
        }

        async function callGemini(userQuery) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                generationConfig: { 
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "ARRAY",
                        items: {
                            type: "OBJECT",
                            properties: {
                                q: { type: "STRING" },
                                img_keyword: { type: "STRING" },
                                ans: { type: "STRING" },
                                wrongs: { type: "ARRAY", items: { type: "STRING" } }
                            },
                            required: ["q", "img_keyword", "ans", "wrongs"]
                        }
                    }
                }
            };

            let retries = 5;
            while (retries > 0) {
                try {
                    const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                    const data = await res.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) {
                    retries--;
                    if (retries === 0) throw e;
                    await new Promise(r => setTimeout(r, 1000));
                }
            }
        }

        // --- GAMEPLAY ---

        function startGame() {
            state.active = true;
            state.left.hp = 100;
            state.right.hp = 100;
            state.left.frozen = false;
            state.right.frozen = false;
            
            stopSound(sounds.start);
            playSound(sounds.battle);

            setQuestion('left');
            setQuestion('right');
            updateHP();

            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
        }

        function setQuestion(side) {
            const item = quizPool[Math.floor(Math.random() * quizPool.length)];
            
            state[side].ans = item.ans;
            
            const imgEl = document.getElementById(`img-${side}`);
            imgEl.src = item.img.startsWith('http') ? item.img : item.img; // Simple path check
            imgEl.onerror = () => { imgEl.src = 'https://via.placeholder.com/400?text=Quiz+Image'; };
            
            document.getElementById(`q-text-${side}`).innerText = item.q;

            // Gather choices: correct answer + wrongs
            let choices = [item.ans];
            
            // If the item has explicit wrongs, use them
            if (item.wrongs && item.wrongs.length > 0) {
                choices = choices.concat(item.wrongs);
            }
            
            // Fill up to 4 if necessary using random answers from pool
            while (choices.length < 4 && quizPool.length > 3) {
                let randomAns = quizPool[Math.floor(Math.random() * quizPool.length)].ans;
                if (!choices.includes(randomAns)) choices.push(randomAns);
            }
            
            // Shuffle
            choices.sort(() => Math.random() - 0.5);

            const grid = document.getElementById(`choices-${side}`);
            grid.innerHTML = '';
            choices.forEach(c => {
                const btn = document.createElement('div');
                btn.className = 'choice-item';
                btn.innerText = c;
                btn.onclick = () => handleChoiceClick(side, c);
                grid.appendChild(btn);
            });
        }

        function handleChoiceClick(side, val) {
            if (!state.active || state[side].frozen) return;

            if (val === state[side].ans) {
                triggerAttack(side);
                setQuestion(side);
            } else {
                freezePlayer(side);
            }
        }

        function freezePlayer(side) {
            state[side].frozen = true;
            const panel = document.getElementById(`panel-${side}`);
            panel.classList.add('frozen');

            // 2 Second Freeze Penalty for wrong answers
            setTimeout(() => {
                state[side].frozen = false;
                panel.classList.remove('frozen');
                setQuestion(side);
            }, 2000);
        }

        function triggerAttack(attacker) {
            const victim = attacker === 'left' ? 'right' : 'left';
            state[victim].hp = Math.max(0, state[victim].hp - 10);
            state[attacker].hp = Math.min(100, state[attacker].hp + 2);

            playSound(sounds.powerup);
            setTimeout(() => playSound(sounds.attack), 150);

            const aImg = document.getElementById(`p-${attacker}`);
            const vImg = document.getElementById(`p-${victim}`);
            const spark = document.getElementById(`spark-${victim}`);

            aImg.style.transform = attacker === 'left' ? 'translateX(120px) scale(1.1)' : 'translateX(-120px) scale(1.1)';
            setTimeout(() => {
                aImg.style.transform = 'none';
                spark.style.opacity = '1';
                vImg.style.filter = 'brightness(3) invert(0.2)';
                setTimeout(() => {
                    spark.style.opacity = '0';
                    vImg.style.filter = 'none';
                }, 200);
            }, 150);

            updateHP();
            if(state[victim].hp <= 0) endGame(attacker);
        }

        function updateHP() {
            ['left', 'right'].forEach(s => {
                const bar = document.getElementById(`hp-bar-${s}`);
                bar.style.width = state[s].hp + '%';
                bar.style.backgroundColor = state[s].hp < 30 ? 'var(--hp-red)' : 'var(--hp-green)';
                document.getElementById(`hp-text-${s}`).innerText = state[s].hp;
            });
        }

        function endGame(winner) {
            state.active = false;
            document.getElementById('win-msg').innerText = `${winner === 'left' ? 'PIKACHU' : 'BULBASAUR'} WINS!`;
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('win-screen').classList.add('active');
            
            stopSound(sounds.battle);
            playSound(sounds.start);
        }

        window.addEventListener('click', () => {
            if (!state.active && sounds.start.paused) {
                playSound(sounds.start);
            }
        }, { once: true });
    </script>
</body>
</html>
